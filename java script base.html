<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<style>
.hp-bar{
    display: inline-block;
    width: 260px;
    height: 14px;
    background: black;
    border: 1px solid skyblue;
    border-radius: 8px;
    overflow: hidden;
    margin-top: 6px;
}
.hp-bar div{
    height: 100%;
    width: 100%;
    background:linear-gradient(90deg, green, green);
}
#action-box{
        margin-top: 20px;
    }
    #action-box button{
        padding: 10px 15px;
        width: 120px;
        height: 60px;
        margin-right: 10px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        outline: none;
        cursor: pointer;
        background-color: #00eaff;
        color: #000;
        font-weight: bold;
    }
    #action-box button:disabled{
        background-color: green;
        cursor: not-allowed;
    }
    #action-box button:hover{
        background-color: skyblue;
    }
    .shake{
        animation: attack-animation 0.5s;
    }
    @keyframes attack-animation{
        0% { transform: rotate(0); }
        25% { transform: rotate(20deg); }
         50% { transform: rotate(0); }
          75% { transform: rotate(-20deg); }
           100% { transform: rotate(0); }
    }
</style>    
<body>
 <div id="battle-field">
        <div id="player-side">
            <div id="player-info">
                <img src="cyclone.webp" id="player-img" alt="player-img" width="200" height="200" />
                <p>Name: <span id="player-name"></span></p>
                <div class="hp-bar">
                    <div id="player-health-bar"></div>
                </div>
                <p>HP: <span id="player-hp"></span></p>
                <p>ATK: <span id="player-atk"></span></p>
                <div id="action-box">
                    <button type="button">Normal</button>
                    <button type="button" disabled>skill</button>
                    <button type="button" disabled>ultimate</button>
                </div>
            </div>
        </div>
        <div id="enemy-side">
            <div id="enemy-info">
                <img src="joker.jpeg" id="enemy-img" alt="enemy-img" width="200" height="200" />
                <p>Name: <span id="enemy-name"></span></p>
                <div class="hp-bar">
                    <div id="enemy-health-bar"></div>
                </div>
                <p>HP: <span id="enemy-hp"></span></p>
                <p>ATK: <span id="enemy-atk"></span></p>
            </div>
        </div>
    </div>
    <script>
    	const player={
    		img:"cycolne.webp",
    		name:"player1",
    		atk:800,
    		hp:8800,
    	}
    	const enemy={
    		img:"joker.jpeg",
    		name:"enemy1",
    		atk:800,
    		hp:8000,
    	} 
    	function loadCharacter(){
    		//player info
    		document.getElementById('player-name').textContent=player.name;
    		document.getElementById('player-atk').textContent=player.atk;
    		document.getElementById('player-hp').textContent=player.hp;
    		document.getElementById('player-img').textContent=player.img;

    		//enemy info
    		document.getElementById('enemy-name').textContent=enemy.name;
    		document.getElementById('enemy-atk').textContent=enemy.atk;
    		document.getElementById('enemy-hp').textContent=enemy.hp;
    		document.getElementById('enemy-img').textContent=enemy.img;
    	}
    	function attack(){
        	enemy.hp-=player.atk;
        	   if (enemy.hp<0){
        	       	enemy.hp=0;
                    alert('EASY')
        	   }
            document.getElementById('enemy-hp').textContent=enemy.hp;
            let img=document.getElementById('enemy-img')
            img.classList.add('shake');
            setTimeout(function(){
                img.classList.remove('shake');
            },500);

            setTimeout(Enemyattack,1000);
            changehealtbar();
       }
        function Enemyattack(){
            
            player.hp-=enemy.atk;
            if (player.hp<0){
                player.hp=0;
                alert('noob')
            }
            
            document.getElementById('player-hp').textContent=player.hp;
            changehealtbar();
         }

        	document.addEventListener('DOMContentLoaded',function(){
        		loadCharacter();
        	});

        function changehealtbar(){
            const playerHpBar=document.getElementById('player-health-bar');
            let hpPrecentPlayer=(player.hp/100)*100;
            playerHpBar.style.width=hpPrecentPlayer+'%';
            const enemyHpBar=document.getElementById('enemy-health-bar');
            let hpPrecent=(enemy.hp/80)*100;
            enemyHpBar.style.width=hpPrecent+'%';
        }
        


        const buttons=document.querySelectorAll('#action-box button');
           buttons.forEach(function(button){

            button.addEventListener('click',function(){

                const action=this.textContent;
                if (action=== 'Normal'){

                    attack();
                }
            });
        });
    </script>
</body>
</html>
